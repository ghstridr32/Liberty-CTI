<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Texas cyber threat ecosystem map</title>
  <desc id="desc">Liberty CTI map using an accurate Texas state outline with major industry hubs and cyber threat pathways.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101823"/><stop offset="0.55" stop-color="#0d1721"/><stop offset="1" stop-color="#070b10"/></linearGradient>
    <radialGradient id="glow" cx="55%" cy="48%" r="58%"><stop offset="0" stop-color="#6f899d" stop-opacity=".32"/><stop offset=".52" stop-color="#1d3142" stop-opacity=".48"/><stop offset="1" stop-color="#0b121b" stop-opacity="0"/></radialGradient>
    <filter id="outlineGlow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="goldArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#b8963e"/></marker>
    <marker id="redArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#8b1a1a"/></marker>
    <style>
      .city{font:800 27px 'Instrument Sans','Segoe UI',Arial,sans-serif;letter-spacing:.035em;fill:#f4efe6}
      .hub{font:800 13px 'Instrument Sans','Segoe UI',Arial,sans-serif;letter-spacing:.12em;fill:#d4af62}
      .small{font:700 12px 'Instrument Sans','Segoe UI',Arial,sans-serif;letter-spacing:.14em;text-transform:uppercase}
      .legend{font:800 18px 'Instrument Sans','Segoe UI',Arial,sans-serif;letter-spacing:.09em;fill:#f4efe6}
      .legendSmall{font:700 13px 'Instrument Sans','Segoe UI',Arial,sans-serif;letter-spacing:.1em;fill:#c0a35b}
    </style>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>
